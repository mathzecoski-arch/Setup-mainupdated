<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Setup | Processadores</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/componentes.css">


</head>




<body>
    <header class="cabecalho-principal">
        <div class="container">
            <h1>Simulador de Setup</h1>
            <nav aria-label="Navegação de etapas">
                <!-- Mostra a progressão do usuário -->
                 <span class="etapa ativa"> Passo 5 de 8: Refrigeracao</span>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="secao-produtos">
            <h2>Escolha seu cooler</h2>
            <p>Selecione o "Ar-Condicionado" do seu setup.</p>
            
            <!-- O JavaScript injeta os cards dos produtos aqui  -->
            <div id="lista-produtos" class="grid-produtos">
                <p>Carregando opções...</p>
            </div>
            
        </section>

        <div class="acoes-navegacao">
            <a href="armazenamento.html" class="btn-secundario">Voltar</a>
            <button onclick="pularEtapa()" class="btn-secundario" style="border: none; text-decoration: underline;">Pular esta etapa</button>
            <a href="energia.html" class="btn-primario" id="btn-proximo">Avançar</a>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>carregarProdutos("refrigeracao");</script>
</body>
</html>
