<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Setup | Resumo Final</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/componentes.css">
    <style>
        /* Estilos específicos para a tabela de resumo */
        .tabela-resumo {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: var(--bg-card);
            border-radius: var(--borda-raio);
            overflow: hidden;
        }
        .tabela-resumo th, .tabela-resumo td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #29292e;
        }
        .tabela-resumo th {
            background-color: var(--bg-secundario);
            color: var(--texto-secundario);
        }
        .linha-total {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--cor-sucesso);
            background-color: #24242d;
        }
        .acoes-finais {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header class="cabecalho-principal">
        <div class="container">
            <h1>Simulador de Setup</h1>
            <nav aria-label="Navegação de etapas">
                <span class="etapa ativa">Resumo do Projeto</span>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="secao-produtos">
            <h2>Seu Setup Está Pronto!</h2>
            <p>Confira os componentes escolhidos e o orçamento total da sua máquina.</p>
            
            <table class="tabela-resumo">
                <thead>
                    <tr>
                        <th>Categoria</th>
                        <th>Componente</th>
                        <th>Preço (R$)</th>
                    </tr>
                </thead>
                <tbody id="corpo-resumo">
                    </tbody>
                <tfoot>
                    <tr class="linha-total">
                        <td colspan="2" style="text-align: right;">Total Estimado:</td>
                        <td id="valor-total">R$ 0,00</td>
                    </tr>
                </tfoot>
            </table>
        </section>

        <div class="acoes-finais">
            <button onclick="reiniciarSetup()" class="btn-secundario">Refazer Setup</button>
            <button onclick="finalizarSetup()" class="btn-primario">Salvar Orçamento</button>
        </div>
    </main>

    <script src="js/resumo.js"></script>
</body>
</html>
